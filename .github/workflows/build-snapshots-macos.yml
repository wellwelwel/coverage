name: '🍎 Build Snapshots — macOS'

on:
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-latest
    timeout-minutes: 20
    name: Generate macOS Snapshots
    steps:
      - name: ➕ Actions - Checkout
        uses: actions/checkout@v4

      - name: ➕ Actions - Setup Node.js
        uses: actions/setup-node@v6
        with:
          check-latest: true
          node-version: lts/*
          cache: 'npm'

      - name: ➕ Actions - Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: ➕ Actions - Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x.x

      - name: 📦 Installing Dependencies
        run: npm ci

      - name: 🧪 Generating Snapshots
        run: npm run build:snapshots

      - name: 📤 Upload macOS snapshots
        uses: actions/upload-artifact@v7
        with:
          name: snapshots-darwin
          path: test/__snapshots__/e2e/**/darwin/**
          retention-days: 7
          if-no-files-found: error
