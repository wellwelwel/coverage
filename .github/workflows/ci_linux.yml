name: '🐧 CI — Coverage'

on:
  push:
    branches:
      - 'main'
  pull_request:
    paths:
      - '.github/workflows/ci_linux.yml'
      - 'src/**'
      - 'test/**'
      - 'package-lock.json'
      - 'package.json'
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  node:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22, 24, 25]
    name: Node.js ${{ matrix.node-version }}
    steps:
      - name: ➕ Actions - Checkout
        uses: actions/checkout@v4

      - name: ➕ Actions - Setup Node.js
        uses: actions/setup-node@v6
        with:
          check-latest: true
          node-version: ${{ matrix.node-version }}

      - name: ➕ Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-linux-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-linux-

      - name: 📦 Installing Dependencies
        run: npm ci

      - name: 🧪 Testing
        run: set -o pipefail && npm run test:node 2>&1 | tee test-output.log

      - name: 📤 Upload test output
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: test-output-linux-node-${{ matrix.node-version }}
          path: |
            test-output.log
            test/__fixtures__/e2e/**/coverage/
          retention-days: 7
          if-no-files-found: warn

  bun:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
    name: Bun
    steps:
      - name: ➕ Actions - Checkout
        uses: actions/checkout@v4

      - name: ➕ Actions - Setup Node.js
        uses: actions/setup-node@v6
        with:
          check-latest: true
          node-version: lts/*

      - name: ➕ Actions - Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: ➕ Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-linux-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-linux-

      - name: 📦 Installing Dependencies
        run: npm ci

      - name: 🧪 Testing
        run: set -o pipefail && npm run test:bun 2>&1 | tee test-output.log

      - name: 📤 Upload test output
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: test-output-linux-bun
          path: |
            test-output.log
            test/__fixtures__/e2e/**/coverage/
          retention-days: 7
          if-no-files-found: warn

  deno:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
    name: Deno
    steps:
      - name: ➕ Actions - Checkout
        uses: actions/checkout@v4

      - name: ➕ Actions - Setup Node.js
        uses: actions/setup-node@v6
        with:
          check-latest: true
          node-version: lts/*

      - name: ➕ Actions - Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x.x

      - name: ➕ Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-linux-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-linux-

      - name: 📦 Installing Dependencies
        run: npm ci

      - name: 🧪 Testing
        run: set -o pipefail && npm run test:deno 2>&1 | tee test-output.log

      - name: 📤 Upload test output
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: test-output-linux-deno
          path: |
            test-output.log
            test/__fixtures__/e2e/**/coverage/
          retention-days: 7
          if-no-files-found: warn
