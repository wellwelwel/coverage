name: '🪟 CI — Windows'

on:
  push:
    branches:
      - 'main'
  pull_request:
    paths:
      - '.github/workflows/ci_coverage-windows.yml'
      - 'src/**'
      - 'test/**'
      - 'package-lock.json'
      - 'package.json'
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
    name: Windows
    steps:
      - name: ➕ Actions - Checkout
        uses: actions/checkout@v4

      - name: ➕ Actions - Setup Node.js
        uses: actions/setup-node@v6
        with:
          check-latest: true
          node-version: lts/*
          cache: 'npm'

      - name: 📦 Installing Dependencies
        run: npm ci

      - name: 🚀 Building
        run: npm run build

      - name: 🧪 Testing
        shell: bash
        run: set -o pipefail && npm run test:node 2>&1 | tee test-output.log

      - name: 📤 Upload test output
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: test-output-windows-node
          path: |
            test-output.log
            test/__fixtures__/e2e/**/coverage/
          retention-days: 7
          if-no-files-found: warn
