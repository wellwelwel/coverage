name: '🪟 CI — Windows'

on:
  push:
    branches:
      - 'main'
  pull_request:
    paths:
      - '.github/workflows/ci_windows.yml'
      - 'src/**'
      - 'test/**'
      - 'package-lock.json'
      - 'package.json'
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
    name: Node.js
    steps:
      - name: ➕ Actions - Checkout
        uses: actions/checkout@v4

      - name: ➕ Actions - Setup Node.js
        uses: actions/setup-node@v6
        with:
          check-latest: true
          node-version: lts/*
          cache: 'npm'

      - name: 📦 Installing Dependencies
        run: npm ci

      - name: 🚀 Building
        run: npm run build

      - name: 🧪 Testing
        shell: pwsh
        run: npm run test:node *>&1 | Tee-Object -FilePath test-output.log

      - name: 📤 Upload test output
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: test-output-windows-node
          path: |
            test-output.log
            test/__fixtures__/e2e/**/coverage/
          retention-days: 7
          if-no-files-found: warn

  bun:
    runs-on: windows-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
    name: Bun
    steps:
      - name: ➕ Actions - Checkout
        uses: actions/checkout@v4

      - name: ➕ Actions - Setup Node.js
        uses: actions/setup-node@v6
        with:
          check-latest: true
          node-version: lts/*
          cache: 'npm'

      - name: ➕ Actions - Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Installing Dependencies
        run: npm ci

      - name: 🚀 Building
        run: npm run build

      - name: 🧪 Testing
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          shell: pwsh
          command: npm run test:bun *>&1 | Tee-Object -FilePath test-output.log

      - name: 📤 Upload test output
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: test-output-windows-bun
          path: |
            test-output.log
            test/__fixtures__/e2e/**/coverage/
          retention-days: 7
          if-no-files-found: warn

  deno:
    runs-on: windows-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
    name: Deno
    steps:
      - name: ➕ Actions - Checkout
        uses: actions/checkout@v4

      - name: ➕ Actions - Setup Node.js
        uses: actions/setup-node@v6
        with:
          check-latest: true
          node-version: lts/*
          cache: 'npm'

      - name: ➕ Actions - Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x.x

      - name: 📦 Installing Dependencies
        run: npm ci

      - name: 🚀 Building
        run: npm run build

      - name: 🧪 Testing
        shell: pwsh
        run: npm run test:deno *>&1 | Tee-Object -FilePath test-output.log

      - name: 📤 Upload test output
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: test-output-windows-deno
          path: |
            test-output.log
            test/__fixtures__/e2e/**/coverage/
          retention-days: 7
          if-no-files-found: warn
